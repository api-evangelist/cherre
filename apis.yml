aid: cherre
url: https://raw.githubusercontent.com/api-evangelist/cherre/refs/heads/main/apis.yml
name: Cherre
kind: company
description: Cherre is a real-estate data-integration and property-intelligence platform
  that connects, cleans, and resolves public, third-party, and proprietary real-estate
  datasets - property characteristics, tax and assessments, recorder and deeds, owners,
  parcel boundaries, and connected portfolio data - and serves them back through a single
  GraphQL API built on Hasura.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Real Estate
- Property Intelligence
- Data Integration
- Knowledge Graph
- GraphQL
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
